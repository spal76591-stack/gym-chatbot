<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBot – Your Fitness Assistant</title>
    <meta name="description" content="Chat with GymBot to explore membership plans, book free trials, and connect with trainers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C5CE7;
            --primary-light: #a29bfe;
            --primary-dark: #4834d4;
            --accent: #00cec9;
            --accent-glow: rgba(0, 206, 201, 0.25);
            --bg-dark: #0a0a1a;
            --bg-card: #12122a;
            --bg-chat: #0e0e22;
            --bg-input: #1a1a3e;
            --text-primary: #f0f0ff;
            --text-secondary: #8888aa;
            --bot-bubble: linear-gradient(135deg, #1e1e42 0%, #1a1a3a 100%);
            --user-bubble: linear-gradient(135deg, #6C5CE7 0%, #4834d4 100%);
            --border: rgba(108, 92, 231, 0.15);
            --shadow-glow: 0 0 30px rgba(108, 92, 231, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 206, 201, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(108, 92, 231, 0.05) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -3%) rotate(3deg); }
        }

        /* Chat Container */
        .chat-container {
            position: relative;
            z-index: 1;
            width: 440px;
            max-width: 95vw;
            height: 92vh;
            max-height: 750px;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-glow), 0 25px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: containerIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .chat-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15) 0%, rgba(0, 206, 201, 0.08) 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(108, 92, 231, 0.5); }
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e676;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.5);
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-status span {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-chat);
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(108, 92, 231, 0.3);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.bot .msg-avatar {
            background: linear-gradient(135deg, #6C5CE7, #00cec9);
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #2d2d5e, #1a1a3e);
            border: 1px solid var(--border);
        }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-line;
            word-wrap: break-word;
        }

        .message.bot .msg-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
            color: var(--text-primary);
        }

        .message.user .msg-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 6px;
            color: #fff;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.25);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            gap: 10px;
            max-width: 88%;
            animation: msgIn 0.3s ease;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            padding: 16px 22px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Quick Replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 20px 14px;
            background: var(--bg-chat);
            animation: msgIn 0.5s ease;
        }

        .quick-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(108, 92, 231, 0.08);
            color: var(--primary-light);
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
        }

        .quick-btn:active {
            transform: translateY(0);
        }

        /* Input Area */
        .chat-input-area {
            padding: 16px 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: var(--text-secondary);
        }

        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: none;
            background: var(--user-bubble);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.2s ease;
        }

        .send-btn:hover svg {
            transform: translateX(2px);
        }

        /* Timestamp */
        .msg-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.user .msg-time {
            text-align: right;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            text-align: center;
            gap: 16px;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.3);
            margin-bottom: 4px;
        }

        .welcome-screen h2 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-screen p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 280px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .chat-container {
                width: 100vw;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-avatar">🏋️</div>
            <div class="header-info">
                <h1>GymBot</h1>
                <div class="header-status">
                    <div class="status-dot"></div>
                    <span>Online • Ready to help</span>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">💪</div>
                <h2>Welcome to GymBot</h2>
                <p>Your personal fitness assistant. Ask about plans, trials, timings, or connect with a trainer!</p>
            </div>
        </div>

        <!-- Quick Replies -->
        <div class="quick-replies" id="quickReplies">
            <button class="quick-btn" onclick="sendQuick('Hi')">👋 Say Hello</button>
            <button class="quick-btn" onclick="sendQuick('Membership plans')">🏋️ Plans</button>
            <button class="quick-btn" onclick="sendQuick('Free trial')">🎯 Free Trial</button>
            <button class="quick-btn" onclick="sendQuick('Location')">📍 Location</button>
            <button class="quick-btn" onclick="sendQuick('Talk to trainer')">💬 Trainer</button>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Type your message..." 
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const welcomeScreen = document.getElementById('welcomeScreen');
        let firstMessage = true;

        // Enter key to send
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        chatInput.focus();

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, sender) {
            if (firstMessage && welcomeScreen) {
                welcomeScreen.remove();
                firstMessage = false;
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = sender === 'bot' ? '🤖' : '🧑';

            const contentWrap = document.createElement('div');

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = getTime();

            contentWrap.appendChild(bubble);
            contentWrap.appendChild(time);

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentWrap);

            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator active';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="msg-avatar" style="background: linear-gradient(135deg, #6C5CE7, #00cec9);">🤖</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(typing);
            scrollToBottom();
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            chatMessages.scrollTo({
                top: chatMessages.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            addMessage(text, 'user');

            showTyping();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await res.json();

                // Simulate a natural delay
                setTimeout(() => {
                    hideTyping();
                    addMessage(data.reply, 'bot');
                }, 600 + Math.random() * 600);

            } catch (err) {
                setTimeout(() => {
                    hideTyping();
                    addMessage('⚠️ Could not connect. Please try again.', 'bot');
                }, 500);
            }
        }

        function sendQuick(text) {
            chatInput.value = text;
            sendMessage();
        }
    </script>
</body>
</html>
